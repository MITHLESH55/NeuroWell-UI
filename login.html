<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NeuroWell</title>
  <meta name="description" content="Sign in to your NeuroWell account to access your wellness dashboard, scores, and personalized recommendations.">

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }

    /* Background effects */
    .auth-container::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    .auth-container::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(250, 204, 21, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
    }

    .auth-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      width: 100%;
      max-width: 420px;
      padding: 2.75rem;
      animation: fadeInUp 0.7s ease-out both;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .auth-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
    }

    .auth-header h1 {
      font-size: 1.65rem;
      font-weight: 800;
      color: white;
      margin-bottom: 0.35rem;
      letter-spacing: -0.02em;
    }

    .auth-header p {
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.35rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.45rem;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.875rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
    }

    .form-group input::placeholder {
      color: var(--text-tertiary);
    }

    .form-group input.error {
      border-color: var(--danger);
    }

    .form-group input.success {
      border-color: var(--success);
    }

    .error-message {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .error-message.hidden {
      display: none;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 14px;
      padding: 0.75rem 1rem;
      color: var(--success);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .success-message.hidden {
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--primary-gradient);
      border: none;
      border-radius: var(--radius-full);
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.75rem;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.45);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    .submit-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.75rem;
      color: var(--text-tertiary);
      font-size: 0.875rem;
    }

    .auth-footer a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .auth-footer a:hover {
      color: var(--accent);
    }

    .input-icon {
      position: relative;
    }

    .input-icon::before {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      opacity: 0.5;
    }

    .input-icon.email input {
      padding-right: 2.75rem;
    }

    .input-icon.email::before {
      content: '✉️';
    }

    .input-icon.password input {
      padding-right: 2.75rem;
    }

    .input-icon.password::before {
      content: '🔒';
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
        border-radius: 22px;
      }

      .auth-header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body data-page="login">
  <!-- Main Content -->
  <main>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">🧠</div>
          <h1>Welcome Back</h1>
          <p>Sign in to your wellness account</p>
        </div>

        <div id="successMessage" class="success-message hidden">
          <span>✅</span>
          <span id="successText">Success!</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon email">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              >
            </div>
            <div id="emailError" class="error-message hidden">
              <span>⚠️</span>
              <span id="emailErrorText"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon password">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              >
            </div>
            <div id="passwordError" class="error-message hidden">
              <span>⚠️</span>
              <span id="passwordErrorText"></span>
            </div>
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account?
          <a href="register.html">Create one now</a>
        </div>

        <div class="auth-footer" style="margin-top: 0.75rem; font-size: 0.82rem;">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="data/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const successMessage = document.getElementById('successMessage');
    const successText = document.getElementById('successText');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Clear previous errors
      document.getElementById('emailError').classList.add('hidden');
      document.getElementById('passwordError').classList.add('hidden');
      successMessage.classList.add('hidden');

      // Get form values
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Attempt login
      const result = AuthManager.login({ email, password });

      if (result.success) {
        successText.textContent = result.message;
        successMessage.classList.remove('hidden');

        // Redirect to dashboard after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        // Show error message
        if (result.message.includes('email')) {
          document.getElementById('emailErrorText').textContent = result.message;
          document.getElementById('emailError').classList.remove('hidden');
          emailInput.classList.add('error');
        } else {
          document.getElementById('passwordErrorText').textContent = result.message;
          document.getElementById('passwordError').classList.remove('hidden');
          passwordInput.classList.add('error');
        }
      }
    });

    // Clear errors on input
    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('error');
      document.getElementById('emailError').classList.add('hidden');
    });

    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('error');
      document.getElementById('passwordError').classList.add('hidden');
    });
  </script>
</body>
</html>
