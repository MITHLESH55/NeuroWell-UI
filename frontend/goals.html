<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals - NeuroWell</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/goals.css">
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <!-- Goals Container (populated by JS) -->
      <div id="goalsContainer"></div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Loader -->
  <div id="loader-container"></div>

  <!-- Scripts -->
  <!-- Data & Constants -->
  <script src="data/constants.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/rules.js"></script>

  <!-- Core Modules -->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/scoring.js"></script>

  <!-- Feature Modules -->
  <script src="js/goals.js"></script>

  <!-- Page-Specific Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log('📄 Goals Page Loaded');
      
      // Initialize goal tracking
      GoalManager.init();
      GoalManager.renderGoalCards();
      
      // Update goals progress based on current scores
      const wellnessData = StorageManager.getWellnessScore();
      if (wellnessData) {
        GoalManager.calculateGoalProgress(wellnessData.scores);
        GoalManager.renderGoalCards();
      }
    });
  </script>
</body>
</html>
