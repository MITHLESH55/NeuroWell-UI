<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness Dashboard - NeuroWell</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="dashboard">
  <!-- Navigation Bar -->
  <div id="navbar-container"></div>

  <!-- Main Content -->
  <main>
    <div class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>Your Wellness Dashboard</h1>
        <p>Track your wellness scores, trends, and burnout risk</p>
      </div>

      <!-- Dashboard Container -->
      <div id="dashboardContainer">
        <!-- Overview Cards -->
        <section id="overviewCards" class="mb-lg"></section>

        <!-- Category Breakdown -->
        <section class="mb-lg">
          <h2 style="margin-bottom: 1rem;">Category Breakdown</h2>
          <div id="categoryBreakdown"></div>
        </section>

        <!-- Burnout Gauge -->
        <section class="mb-lg">
          <div id="burnoutGauge"></div>
        </section>

        <!-- Assessment Trend Analysis: Last 5 Attempts -->
        <section class="mb-lg" id="trendAnalysisSection"></section>

        <!-- Goals Tracking Section -->
        <section class="mb-lg" id="goalsSection"></section>

        <!-- Charts Section -->
        <section class="mb-lg">
          <div class="grid grid-2" style="gap: 2rem;">
            <!-- Category Chart -->
            <div class="chart-container">
              <div class="chart-title">Wellness Categories</div>
              <canvas id="categoryChartCanvas" style="max-height: 400px;"></canvas>
            </div>

            <!-- Trend Chart -->
            <div class="chart-container">
              <div class="chart-title">Wellness Trend</div>
              <canvas id="trendChartCanvas" style="max-height: 400px;"></canvas>
            </div>
          </div>
        </section>

        <!-- Metrics Section -->
        <section class="mb-lg">
          <h2 style="margin-bottom: 1rem;">Detailed Metrics</h2>
          <div id="metricsContainer"></div>
        </section>

        <!-- Recommendations Section -->
        <section class="mb-lg">
          <h2 style="margin-bottom: 1rem;">Top Recommendations</h2>
          <div id="recommendationsContainer"></div>
          <div style="text-align: center; margin-top: 1.5rem;">
            <a href="recommendations.html" class="btn btn-secondary">
              View All Recommendations →
            </a>
          </div>
        </section>

        <!-- Action Section -->
        <section class="card mb-lg">
          <div class="card-header">
            <h3>Next Steps</h3>
          </div>
          <div class="card-body">
            <div class="grid grid-3" style="gap: 1rem;">
              <a href="recommendations.html" class="btn btn-primary">
                💡 Get Recommendations
              </a>
              <a href="assessment.html" class="btn btn-secondary">
                🔄 Retake Assessment
              </a>
              <button class="btn btn-secondary" id="exportBtn">
                📥 Export Data
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Loader Component -->
  <div id="loader-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="data/constants.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/rules.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/prediction.js"></script>
  <script src="js/recommendations.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/exportReport.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>

  <script>
    // Initialize export data functionality
    document.addEventListener('DOMContentLoaded', () => {
      const exportBtn = document.getElementById('exportBtn');
      if (exportBtn) {
        exportBtn.addEventListener('click', () => {
          ReportManager.showReportPreview();
        });
      }
    });
  </script>
</body>
</html>
