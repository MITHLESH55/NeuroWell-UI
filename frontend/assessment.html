<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness Assessment - NeuroWell</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="assessment">
  <!-- Navigation Bar -->
  <div id="navbar-container"></div>

  <!-- Main Content -->
  <main>
    <div class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>Wellness Assessment</h1>
        <p>Answer 15 questions about your physical, mental, and emotional wellness</p>
      </div>

      <!-- Assessment Container -->
      <div class="assessment-container">
        <!-- Step Indicator -->
        <div id="stepIndicator"></div>

        <!-- Progress Bar -->
        <div class="progress mb-lg">
          <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <!-- Questions Container -->
        <div id="questionsContainer"></div>

        <!-- Navigation Buttons -->
        <div id="navigationContainer"></div>

        <!-- Assessment Tips -->
        <div class="alert alert-info mt-lg" style="margin-bottom: 2rem;">
          <span>💡 <strong>Tip:</strong> Answer honestly for accurate wellness insights. This should take about 5-10 minutes.</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Loader Component -->
  <div id="loader-container"></div>

  <!-- Scripts -->
  <script src="data/constants.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/rules.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/prediction.js"></script>
  <script src="js/recommendations.js"></script>
  <script src="js/app.js"></script>
  <script src="js/assessment.js"></script>

  <script>
    // Update progress bar
    const updateProgress = () => {
      const currentStep = document.body.dataset.currentStep || 1;
      const totalSteps = 5;
      const percentage = (currentStep / totalSteps) * 100;
      const progressBar = document.getElementById('progressBar');
      if (progressBar) {
        progressBar.style.width = percentage + '%';
      }
    };

    // Update progress on step change (listen to DOM changes)
    const observer = new MutationObserver(updateProgress);
    observer.observe(document.body, { attributes: true, attributeFilter: ['data-current-step'] });
    updateProgress();
  </script>
</body>
</html>
