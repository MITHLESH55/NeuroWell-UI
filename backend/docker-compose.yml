version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/neurowell
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      - mongodb
    networks:
      - neurowell-network
    restart: unless-stopped

  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=neurowell
    volumes:
      - mongodb_data:/data/db
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - neurowell-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  neurowell-network:
    driver: bridge