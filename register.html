<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NeuroWell</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 2rem;
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-2xl);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      max-height: 90vh;
      overflow-y: auto;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--text-tertiary);
      font-size: 0.95rem;
    }

    .logo-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all var(--transition-base);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-tertiary);
    }

    .form-group input.error {
      border-color: var(--danger);
    }

    .error-message {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .error-message.hidden {
      display: none;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1rem;
      color: var(--success);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .success-message.hidden {
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: var(--primary-gradient);
      border: none;
      border-radius: var(--radius-lg);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all var(--transition-base);
      margin-top: 1rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-base);
    }

    .auth-footer a:hover {
      color: var(--secondary);
    }

    .password-strength {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      padding: 0.5rem;
      border-radius: var(--radius-md);
      background: rgba(59, 130, 246, 0.1);
      color: var(--info);
      display: none;
    }

    .password-strength.show {
      display: block;
    }

    .password-strength.weak {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .password-strength.fair {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
    }

    .password-strength.strong {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .input-icon {
      position: relative;
    }

    .input-icon::before {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    .input-icon.name input,
    .input-icon.email input,
    .input-icon.password input {
      padding-right: 2.75rem;
    }

    .input-icon.name::before {
      content: '👤';
    }

    .input-icon.email::before {
      content: '✉️';
    }

    .input-icon.password::before {
      content: '🔒';
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 1.5rem;
      }

      .auth-header h1 {
        font-size: 1.5rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body data-page="register">
  <!-- Main Content -->
  <main>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-icon">🧠</div>
          <h1>NeuroWell</h1>
          <p>Create your wellness account</p>
        </div>

        <div id="successMessage" class="success-message hidden">
          <span>✅</span>
          <span id="successText">Registration successful!</span>
        </div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <div class="input-icon name">
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="John Doe"
                required
              >
            </div>
            <div id="fullNameError" class="error-message hidden">
              <span>⚠️</span>
              <span id="fullNameErrorText"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon email">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              >
            </div>
            <div id="emailError" class="error-message hidden">
              <span>⚠️</span>
              <span id="emailErrorText"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon password">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              >
            </div>
            <div id="passwordStrength" class="password-strength">
              Password strength: <span id="strengthText">Weak</span>
            </div>
            <div id="passwordError" class="error-message hidden">
              <span>⚠️</span>
              <span id="passwordErrorText"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-icon password">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="••••••••"
                required
              >
            </div>
            <div id="confirmPasswordError" class="error-message hidden">
              <span>⚠️</span>
              <span id="confirmPasswordErrorText"></span>
            </div>
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="login.html">Sign in</a>
        </div>

        <div class="auth-footer" style="font-size: 0.85rem;">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="data/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordStrength = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');
    const successMessage = document.getElementById('successMessage');

    // Password strength checker
    const checkPasswordStrength = (password) => {
      if (password.length === 0) return null;
      if (password.length < 6) return 'weak';
      if (password.length < 10) return 'fair';
      return 'strong';
    };

    passwordInput.addEventListener('input', () => {
      const strength = checkPasswordStrength(passwordInput.value);
      if (strength) {
        passwordStrength.classList.add('show');
        passwordStrength.classList.remove('weak', 'fair', 'strong');
        passwordStrength.classList.add(strength);
        strengthText.textContent = strength.charAt(0).toUpperCase() + strength.slice(1);
      } else {
        passwordStrength.classList.remove('show');
      }

      // Clear error
      document.getElementById('passwordError').classList.add('hidden');
      passwordInput.classList.remove('error');
    });

    // Form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Clear all previous errors
      document.querySelectorAll('.error-message').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
      successMessage.classList.add('hidden');

      // Get form values
      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // Attempt registration
      const result = AuthManager.register({
        fullName,
        email,
        password,
        confirmPassword
      });

      if (result.success) {
        document.getElementById('successText').textContent = result.message;
        successMessage.classList.remove('hidden');
        form.reset();
        passwordStrength.classList.remove('show');

        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 2000);
      } else {
        // Show error for the relevant field
        const message = result.message;
        
        if (message.includes('name')) {
          document.getElementById('fullNameErrorText').textContent = message;
          document.getElementById('fullNameError').classList.remove('hidden');
          fullNameInput.classList.add('error');
        } else if (message.includes('email')) {
          document.getElementById('emailErrorText').textContent = message;
          document.getElementById('emailError').classList.remove('hidden');
          emailInput.classList.add('error');
        } else if (message.includes('do not match')) {
          document.getElementById('confirmPasswordErrorText').textContent = message;
          document.getElementById('confirmPasswordError').classList.remove('hidden');
          confirmPasswordInput.classList.add('error');
        } else {
          document.getElementById('passwordErrorText').textContent = message;
          document.getElementById('passwordError').classList.remove('hidden');
          passwordInput.classList.add('error');
        }
      }
    });

    // Clear errors on input
    fullNameInput.addEventListener('input', () => {
      fullNameInput.classList.remove('error');
      document.getElementById('fullNameError').classList.add('hidden');
    });

    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('error');
      document.getElementById('emailError').classList.add('hidden');
    });

    confirmPasswordInput.addEventListener('input', () => {
      confirmPasswordInput.classList.remove('error');
      document.getElementById('confirmPasswordError').classList.add('hidden');
    });
  </script>
</body>
</html>
